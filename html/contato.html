<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">

    <title>LinkedIF - Contato</title>

    <!-- Ícone da aba do navegador -->
    <link rel="shortcut icon" href="../img/linkedif_fav.png" type="image/x-icon">

    <!-- Arquivos CSS -->
    <link rel="stylesheet" href="../css/contato.css">
    <link rel="stylesheet" href="../css/style.css">

    <!-- Fonte utilizada no projeto -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">

    <!-- Biblioteca de ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body class="source-sans-3-linkedif">

    <!-- Cabeçalho da página -->
    <div id="header-container">

        <header id="page-header">

            <!-- Logo do site -->
            <a href="../index.html">
                <img src="../img/linkedif_logo.png" alt="Logo LinkedIF">
            </a>

            <!-- Menu de navegação -->
            <nav>
                <ul>

                    <!-- Página inicial -->
                    <li>
                        <a href="../index.html" title="Início">
                            <i class="fa-solid fa-house"></i>
                        </a>
                    </li>

                    <!-- Página da matriz curricular -->
                    <li>
                        <a href="../html/componentes.html" title="Matriz Curricular">
                            <i class="fa-solid fa-book"></i>
                        </a>
                    </li>

                    <!-- LinkedIn -->
                    <li>
                        <a href="https://www.linkedin.com/in/pedro-aragoni/" target="_blank" title="LinkedIn">
                            <i class="fa-brands fa-linkedin"></i>
                        </a>
                    </li>

                </ul>
            </nav>

        </header>

    </div>

    <!-- Conteúdo principal -->
    <main id="pagina-contato">

        <section id="formulario">

            <h1>Contato</h1>

            <p>
                Envie uma mensagem ou acesse minhas redes sociais.
            </p>

            <!-- Formulário -->
            <form action="#" method="post">

                <label for="nome">Nome</label>
                <input type="text"
                    id="nome"
                    name="nome"
                    placeholder="Digite seu nome"
                    required>

                <label for="email">E-mail</label>
                <input type="email"
                    id="email"
                    name="email"
                    placeholder="Digite seu e-mail"
                    required>

                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem"
                        name="mensagem"
                        placeholder="Digite sua mensagem"
                        required></textarea>

                <button type="submit">
                    Enviar
                </button>

            </form>

            <!-- Redes sociais -->
            <div id="redes-contato">

                <a href="https://www.linkedin.com/in/pedro-aragoni/" target="_blank">
                    <i class="fa-brands fa-linkedin"></i>
                </a>

                <a href="https://github.com/pedroaragoni-dev" target="_blank">
                    <i class="fa-brands fa-github"></i>
                </a>
                
                <a href="https://www.instagram.com/ph_aragoni/" target="_blank">
                    <i class="fa-brands fa-square-instagram"></i>
                </a>

            </div>

        </section>

    </main>

    <!-- Rodapé -->
    <footer>
        <p>&copy; ARQIDPW - 2026. Todos os direitos reservados</p>
    </footer>

</body>

</html>
